; Copy this file to the active TestMaster config folder:
;
;   #SM_CONFIG#\TMPython.ini
;
; On the photographed machine this is likely:
;
;   D:\TestMasterData\config\TMPython.ini
;
; Replace the placeholder paths below before using this on the machine.
; Keep one named section per process/test so users do not overwrite each other.
;
; Recommended self-contained process layout:
;
;   D:\TestMasterData\<active-process>\Python\
;     .venv\
;     testmaster_alignment\
;     testmaster_vision\
;     log\

; Optional shared interpreter section. Use this only if the machine owner wants
; one central package environment for multiple processes.
[Python_310_SHARED]
WorkingDirectory = "D:\TestMasterData\System\Python\"
PythonInterpreter = "D:\TestMasterData\System\Python\.venv\Scripts\python.exe"
LogDirectory = "D:\TestMasterData\System\Python\log"

; Process-local section for this migration. This keeps the code, packages, and
; logs together under the active process folder.
[Python_310_ALIGNMENT_TEST]
WorkingDirectory = "D:\TestMasterData\<active-process>\Python\"
PythonInterpreter = "D:\TestMasterData\<active-process>\Python\.venv\Scripts\python.exe"
LogDirectory = "D:\TestMasterData\<active-process>\Python\log"

; Same process-local layout with a process-specific name. If you use this
; section, set the YASE TMPython Interpreter field to:
;
;   Python_310_MICROCOMBSYS_INTERPRETER
[Python_310_MICROCOMBSYS_INTERPRETER]
WorkingDirectory = "D:\TestMasterData\<active-process>\Python\"
PythonInterpreter = "D:\TestMasterData\<active-process>\Python\.venv\Scripts\python.exe"
LogDirectory = "D:\TestMasterData\<active-process>\Python\log"
